# Basic part

[General]

// > Configuration file icon

Profile_img_url=https://img.sveir.xyz/static/favicon%40trs.png

// > Network test link

Network_check_url=http://www.bing.com

// > Server test link

Server_check_url=http://www.gstatic.com/generate_204

// > Server test timeout time (milliseconds)

Server_check_timeout=3000

// > Node GEO location information detection

// If you don't need to identify the node area as Chinese and display the national flag, please annotate the following line geo_location_checker ß

Geo_location_checker=http://ip-api.com/json/? lang=en-US,https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/IP_API.js

// > Specify the operating mode under WiFi SSID

// If you need to specify the running mode corresponding to the SSID, please cancel the following comments and custom the configuration.

;Running_mode_trigger = filter, filter, asus-5g:all_direct, asus:all_proxy

// > Resource Parser

resource_parser_url=https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js

// > DNS exclusion list

// Without using fakeip mapping, it can prevent the detection of proxy to a certain extent.

Dns_exclusion_list = *.lan, cable.auth.com, *.msftconnecttest.com, *.msftncsi.com, network-test.debian.org, detectportal.firefox.com, resolver1.opendns.com, *.srv.nintendo.net, *.stun.playstation.net, xbox. *.Microsoft.com, *.xboxlive.com, stun. *, *.qq.com, localhost. *.Qq.com, *.logon.battlenet.com.cn, *.logon.battle.net, *.blzstatic.cn, *.cmpassport.com, id6.me, open.e.189.cn, mdn.open.wo.cn, auth.wosms.cn, *.jegotrip.com.cn, *.icitymobile.mobi, *.pingan.com.cn, *.cmbchina.com, *? Miwifi.com, pool.ntp.org, *.pool.ntp.org, ntp. *.Com, time. *.Com, ntp?. *.Com, time?. *.Com, time. *.Gov, time. *.Edu.cn, *.ntp.org.cn, time. *.Apple.com, PDC._msDCS. *. *, DC._msDCS. *. *, GC._msDCS. *. *

// > Exclude routing

// The routing in the following ip-cidr will not be processed by QuantumultX

Excluded_routes = 192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8, 239.255.255.250/32

# Domain name resolution part

[Dns]

// If you need to disable the system DNS (no-system), please cancel the downline annotation.

;No-system

// If you need to disable IPv6, please cancel the downline comment.

;No-ipv6

// If you need to use DNS over HTTP/3, please cancel the downline comment.

; prefer-doh3

// Specify the DNS server and choose the optimal result in a soncurrent response

Server = 119.29.29.29

Server=182.254.116.116

Server=223.5.5.5

Server = 223.6.6.6

Server = 119.28.28.28

# ⚠️ Note that it is not recommended to specify domain name allocation DNS for instant messaging tools such as WeChat and QQ here.

# This operation will cause WeChat messages to be delayed.

// If you need to specify the DNS over HTTP service, the DNS servers specified above *will be invalidated*, and the doh will be disabled under a specific network.

;Doh-server=https://doh.pub/dns-query, https://223.5.5.5/dns-query, https://223.6.6.6/dns-query

