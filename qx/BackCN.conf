# Based on Quantumult X official standard Sample V1.5.3
# Last updated: 2026-04-02
# Notes:
# - Remote rulesets must use raw.githubusercontent.com URLs (NOT github.com/blob/)
# - Other lists use standard actions: PROXY / DIRECT / REJECT
# - BackCN.list uses custom policy name: BackCN -> United States (US nodes)
# - final is set to direct as you requested

[General]
Profile_img_url=https://img.sveir.xyz/static/favicon%40trs.png
Network_check_url=http://www.bing.com
Server_check_url=http://www.gstatic.com/generate_204
Server_check_timeout=3000
Geo_location_checker=http://ip-api.com/json/? lang=en-US,https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/IP_API.js
;Running_mode_trigger = filter, filter, asus-5g:all_direct, asus:all_proxy
resource_parser_url=https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
Dns_exclusion_list = *.lan, cable.auth.com, *.msftconnecttest.com, *.msftncsi.com, network-test.debian.org, detectportal.firefox.com, resolver1.opendns.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.Microsoft.com, *.xboxlive.com, stun.*, *.qq.com, localhost.*.Qq.com, *.logon.battlenet.com.cn, *.logon.battle.net, *.blzstatic.cn, *.cmpassport.com, id6.me, open.e.189.cn, mdn.open.wo.cn, auth.wosms.cn, *.jegotrip.com.cn, *.icitymobile.mobi, *.pingan.com.cn, *.cmbchina.com, *?Miwifi.com, pool.ntp.org, *.pool.ntp.org, ntp.*.Com, time.*.Com, ntp?.*.Com, time?.*.Com, time.*.Gov, time.*.Edu.cn, *.ntp.org.cn, time.*.Apple.com, PDC._msDCS.*.*, DC._msDCS.*.*, GC._msDCS.*.*
Excluded_routes = 192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8, 239.255.255.250/32

[Dns]
;No-system
;No-ipv6
;prefer-doh3
Server = 119.29.29.29
Server = 182.254.116.116
Server = 223.5.5.5
Server = 223.6.6.6
Server = 119.28.28.28
;Doh-server=https://doh.pub/dns-query, https://223.5.5.5/dns-query, https://223.6.6.6/dns-query

[Policy]

# === Primary node group ===
Static = OutSide, Hong Kong, Singapore, Taiwan, United States, Japan, Korea, Other, direct, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Airport.png

# === (Optional) A UI-only group named "Final" (not the same as filter final rule) ===
static=Final,OutSide,direct,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png

# === Diversion groups (your original) ===
Static=DomesticMedia, direct, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Domestic.png
Static=Domestic, direct, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Back.png
static=Apple, direct, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png
Static=Apple Domestic, direct, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple_Update.png
static=Google, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google.png
Static=Google Domestic, direct, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
static=Microsoft, direct, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png
Static=Microsoft Domestic, direct, OutSide, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png
static=hijacking, reject, direct, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
Static=Advertising, reject, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Advertising.png

# === Region groups (your original) ===
Static = United States, resource-tag-regex=🧁 My subscription, server-tag-regex=United States|US|us, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png

# === Compatibility aliases for standard policy names used in your self-hosted rulesets ===
# Remote lists use PROXY/DIRECT/REJECT, but your main proxy group is OutSide and your direct is "direct".
static=PROXY, OutSide
static=DIRECT, direct

# === BackCN.list uses BackCN as policy name; you want it to route to US nodes ===
static=BackCN, United States, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png

[Server_local]

[Server_remote]
Https://example.com/subscribe.snippet, tag=🧁 My subscription, enabled=true, img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Heart.png

[Filter_local]
# Local diversion rules (local takes precedence)
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 127.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 224.0.0.0/24, direct

;geoip, cn, direct

# Your requested fallback:
final, direct

[Filter_remote]

# === Security / blocking (highest priority) ===
https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/Hijacking.list, tag=Hijacking, enabled=true
https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/Advertising.list, tag=Advertising, enabled=true

# === Proxy-first categories ===
https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/ForeignMedia.list, tag=ForeignMedia, enabled=true
https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/Global.list, tag=Global, enabled=true

# === Direct categories ===
https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/Apple.list, tag=Apple, enabled=true
https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/DomesticMedia.list, tag=DomesticMedia, enabled=true

# === Custom override: domestic domains forced to US nodes (BackCN -> United States) ===
# Must be above China.list so it can override DIRECT rules in China.list.
# https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/BackCN.list, tag=BackCN, enabled=true

# === Mainland direct fallback (near bottom) ===
# https://raw.githubusercontent.com/Jovanykoch/Jovanykoch.github.io/main/qx/rules/China.list, tag=China, enabled=true

